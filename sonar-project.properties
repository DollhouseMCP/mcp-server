# SonarCloud Configuration for DollhouseMCP MCP Server

# Project identification
sonar.projectKey=DollhouseMCP_mcp-server
sonar.organization=dollhousemcp

# Source code configuration
sonar.sources=src
sonar.tests=tests
sonar.javascript.lcov.reportPaths=tests/coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json,tsconfig.scripts.json

# Exclusions for code coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/tests/**,**/test/**,**/dist/**,**/node_modules/**,**/coverage/**

# Duplication (CPD) Exclusions
# Exclude suppressions files which contain intentional repetitive configuration data
# These are configuration files where repetitive structure is expected and necessary
# Exclude QA test scripts which have acceptable duplication for test setup patterns
sonar.cpd.exclusions=src/security/audit/config/suppressions.ts,src/security/audit/config/**,**/tests/**,**/test/**,tests/**,test/**,scripts/qa-*.js

# Additional exclusions from analysis (including QA scripts to exclude from all analysis including duplication)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/*.min.css,scripts/qa-direct-test.js,scripts/qa-github-integration-test.js,docker/.env.docker,**/*.sql

# Secrets scanner scope — exclude Docker config and env files from secrets detection.
# sonar.exclusions doesn't apply to the text/secrets analyzer; this setting does.
sonar.text.inclusions.activate=true
sonar.text.inclusions=src/**,scripts/**,tests/**

# Issue suppression for test files — intentional patterns that are not bugs
# S2871: .sort() without comparator — test assertions use sort for deterministic ordering
# S1848: Unused object instantiation — tests verify constructors throw on bad input
# S2201: Unused return value — benchmarks call methods for timing, not return values
# S6959: reduce() without initial — test arrays are guaranteed non-empty
# S5842: Regex matches empty string — intentional ReDoS test patterns
# S7727: Function passed to .find() — acceptable in test assertions
sonar.issue.ignore.multicriteria=t1,t2,t3,t4,t5,t6,s1,s2,s3,s4,m1,m2,d1,d2,d3,d4
sonar.issue.ignore.multicriteria.t1.ruleKey=typescript:S2871
sonar.issue.ignore.multicriteria.t1.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t2.ruleKey=typescript:S1848
sonar.issue.ignore.multicriteria.t2.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t3.ruleKey=typescript:S2201
sonar.issue.ignore.multicriteria.t3.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t4.ruleKey=typescript:S6959
sonar.issue.ignore.multicriteria.t4.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t5.ruleKey=typescript:S5842
sonar.issue.ignore.multicriteria.t5.resourceKey=tests/**
sonar.issue.ignore.multicriteria.t6.ruleKey=typescript:S7727
sonar.issue.ignore.multicriteria.t6.resourceKey=tests/**
# S4721: OS command execution — scripts are CLI operator tools that run Docker/npm commands
sonar.issue.ignore.multicriteria.s1.ruleKey=typescript:S4721
sonar.issue.ignore.multicriteria.s1.resourceKey=scripts/**
# S4036: PATH variable concern — scripts spawn child processes via standard npm tooling
sonar.issue.ignore.multicriteria.s2.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.s2.resourceKey=scripts/**
# S5443: Temp directory usage — tests use os.tmpdir() for isolated test fixtures
sonar.issue.ignore.multicriteria.s3.ruleKey=typescript:S5443
sonar.issue.ignore.multicriteria.s3.resourceKey=tests/**
# S4036: PATH variable concern — E2E tests spawn server child processes
sonar.issue.ignore.multicriteria.s4.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.s4.resourceKey=tests/**
# SQL migrations are immutable after being applied — cannot refactor
sonar.issue.ignore.multicriteria.m1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.m1.resourceKey=src/database/migrations/**
# PostgreSQL uses VARCHAR, not Oracle's VARCHAR2
sonar.issue.ignore.multicriteria.m2.ruleKey=plsql:VarcharUsageCheck
sonar.issue.ignore.multicriteria.m2.resourceKey=src/database/migrations/**
# Dev-only Docker credentials — intentional defaults for local development.
# Production safeguard in connection.ts refuses to start with these passwords.
sonar.issue.ignore.multicriteria.d1.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.d1.resourceKey=docker/**
sonar.issue.ignore.multicriteria.d2.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.d2.resourceKey=scripts/**
sonar.issue.ignore.multicriteria.d3.ruleKey=yaml:S2068
sonar.issue.ignore.multicriteria.d3.resourceKey=docker/**
sonar.issue.ignore.multicriteria.d4.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.d4.resourceKey=drizzle.config.ts