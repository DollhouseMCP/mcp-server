###############################################################################
# DollhouseMCP — PostgreSQL Database (Development)
#
# Usage:
#   docker compose -f docker/docker-compose.db.yml up -d
#
# Two-role architecture:
#   dollhouse      — superuser, used for migrations only
#   dollhouse_app  — application role, RLS enforced, used by the server
#
# Connection strings (passwords from docker/.env.docker):
#   Application: DOLLHOUSE_DATABASE_URL=postgres://dollhouse_app:<password>@localhost:5432/dollhousemcp
#   Admin:       DOLLHOUSE_DATABASE_ADMIN_URL=postgres://dollhouse:<password>@localhost:5432/dollhousemcp
#
# Run npm run db:setup to configure automatically.
#
# For production, use a managed PostgreSQL instance (RDS, Cloud SQL, etc.)
# with a dedicated application role that has NOSUPERUSER NOBYPASSRLS.
###############################################################################

services:
  postgres:
    image: postgres:17-alpine
    container_name: dollhousemcp-postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - dollhouse-pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-app-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dollhouse -d dollhousemcp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dollhouse-pgdata:
