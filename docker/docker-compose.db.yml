###############################################################################
# DollhouseMCP — PostgreSQL Database (Development)
#
# Usage:
#   docker compose -f docker/docker-compose.db.yml up -d
#
# Connection string for DollhouseMCP:
#   DOLLHOUSE_DATABASE_URL=postgres://dollhouse:dollhouse@localhost:5432/dollhousemcp
#   DOLLHOUSE_STORAGE_BACKEND=database
#
# For production, use a managed PostgreSQL instance (RDS, Cloud SQL, etc.)
# and set DOLLHOUSE_DATABASE_URL to the managed connection string.
###############################################################################

services:
  postgres:
    image: postgres:17-alpine
    container_name: dollhousemcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dollhousemcp
      POSTGRES_USER: dollhouse
      POSTGRES_PASSWORD: dollhouse
    ports:
      - "5432:5432"
    volumes:
      - dollhouse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dollhouse -d dollhousemcp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dollhouse-pgdata:
