name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Optional git ref to publish (for example refs/tags/v2.0.15)'
        required: false
        type: string
      dry_run:
        description: 'Run in dry-run mode (test without publishing)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-publish-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read   # Required for checkout

jobs:
  publish:
    if: github.event_name != 'release' || github.event.release.prerelease != true
    runs-on: ubuntu-latest

    steps:
      - name: Resolve and validate source ref
        id: source-ref
        shell: bash
        run: |
          RAW_REF=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_ref }}" ]]; then
            RAW_REF="${{ github.event.inputs.release_ref }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            RAW_REF="refs/tags/${{ github.event.release.tag_name }}"
          else
            RAW_REF="${{ github.ref }}"
          fi

          if [[ "$RAW_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9._-]+)?$ ]]; then
            RAW_REF="refs/tags/${RAW_REF}"
          fi

          if [[ ! "$RAW_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9._-]+)?$ && ! "$RAW_REF" =~ ^refs/heads/[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Unsupported release ref '$RAW_REF'. Use refs/tags/vX.Y.Z, vX.Y.Z, or a refs/heads/* branch."
            exit 1
          fi

          echo "ref=$RAW_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.source-ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          # Pinned to cosign-installer v4.1.2 so Cosign v3 releases are verified
          # with Sigstore bundles instead of deprecated detached .sig assets.
          # See https://github.com/sigstore/cosign-installer/issues/202.
          cosign-release: 'v3.0.6'

      - name: Download mcp-publisher CLI
        shell: bash
        run: |
          set -euo pipefail

          # Pinned for reproducibility. v1.3.3 used the retired shared OIDC
          # audience ("mcp-registry"); current registry auth expects the
          # registry URL as the audience. When bumping this CLI, update
          # VERSION, ARCHIVE, EXPECTED_SHA256, and the Sigstore identity
          # expectation from the same upstream release.
          VERSION="v1.7.9"
          ARCHIVE="mcp-publisher_linux_amd64.tar.gz"
          EXPECTED_SHA256="ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
          ARCHIVE_FILE="/tmp/mcp-publisher.tar.gz"
          BUNDLE_FILE="/tmp/mcp-publisher.tar.gz.sigstore.json"
          EXPECTED_IDENTITY="https://github.com/modelcontextprotocol/registry/.github/workflows/release.yml@refs/tags/${VERSION}"
          EXPECTED_ISSUER="https://token.actions.githubusercontent.com"

          # Download archive and signature material.
          curl --retry 3 --retry-delay 5 -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/${ARCHIVE}" -o "$ARCHIVE_FILE"
          curl --retry 3 --retry-delay 5 -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/${ARCHIVE}.sigstore.json" -o "$BUNDLE_FILE"

          # Verify the pinned archive digest first for deterministic release inputs.
          if ! echo "${EXPECTED_SHA256}  ${ARCHIVE_FILE}" | sha256sum --check --status; then
            echo "::error::SHA256 verification failed for ${ARCHIVE}"
            exit 1
          fi

          # Verify the upstream Sigstore bundle is tied to the MCP Registry
          # release workflow for the pinned tag.
          cosign verify-blob \
            --bundle "$BUNDLE_FILE" \
            --certificate-identity "$EXPECTED_IDENTITY" \
            --certificate-oidc-issuer "$EXPECTED_ISSUER" \
            "$ARCHIVE_FILE"

          # Extract and install
          tar -xzf "$ARCHIVE_FILE" -C /tmp mcp-publisher
          chmod +x /tmp/mcp-publisher
          sudo mv /tmp/mcp-publisher /usr/local/bin/mcp-publisher

      - name: Verify mcp-publisher installation
        run: mcp-publisher --version

      - name: Login to MCP Registry (OIDC)
        run: mcp-publisher login github-oidc

      - name: Wait for npm package propagation
        if: ${{ github.event.inputs.dry_run != 'true' && startsWith(steps.source-ref.outputs.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=30

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org --silent 2>/dev/null)" \
              && [[ "$PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]]; then
              echo "Detected ${PACKAGE_NAME}@${PACKAGE_VERSION} on npm."
              exit 0
            fi

            if [[ "$attempt" -eq "$MAX_ATTEMPTS" ]]; then
              break
            fi

            echo "Waiting for ${PACKAGE_NAME}@${PACKAGE_VERSION} to propagate to npm (${attempt}/${MAX_ATTEMPTS})..."
            sleep "$SLEEP_SECONDS"
          done

          echo "::error::Timed out waiting for ${PACKAGE_NAME}@${PACKAGE_VERSION} to appear on npm. Rerun the workflow after npm propagation completes."
          exit 1

      - name: Publish to MCP Registry
        shell: bash
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Running in DRY-RUN mode"
            mcp-publisher publish --dry-run
          else
            mcp-publisher publish
          fi
