name: Publish to npm

# This workflow publishes the package to npm registry when a release is published.
# Uses npm Trusted Publishing (OIDC) for secure, token-free authentication.
#
# Trusted Publishing Setup Required:
# 1. Go to https://www.npmjs.com/package/@dollhousemcp/mcp-server/access
# 2. Add Trusted Publisher:
#    - Provider: GitHub Actions
#    - Organization: DollhouseMCP
#    - Repository: mcp-server
#    - Workflow: publish-npm.yml
#    - Environment: (leave blank)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (test without publishing)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-publish-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # Required for OIDC/Trusted Publishing
  contents: read    # Required for checkout

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  CI: true

jobs:
  publish-npm:
    name: Publish to npm Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          # Node 24.x ships with npm 11.x — REQUIRED for OIDC Trusted Publishing.
          # npm 10.x (Node 22) does not support the OIDC handshake and fails with
          # ENEEDAUTH or a misleading E404. npm 11 is the minimum supported version.
          node-version: '24.x'
          # registry-url is required so setup-node creates .npmrc pointing at the
          # registry. NODE_AUTH_TOKEN is explicitly cleared below so that setup-node
          # does not inject GITHUB_TOKEN as the npm auth credential, which would
          # conflict with OIDC Trusted Publishing.
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
        env:
          # CRITICAL: setup-node v4 defaults NODE_AUTH_TOKEN to GITHUB_TOKEN when
          # registry-url is set. Clearing it lets npm fall through to OIDC auth.
          NODE_AUTH_TOKEN: ''

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Note: Tests are skipped in publish workflow because:
      # 1. Tests already run in core-build-test workflow before any merge to main
      # 2. jsdom ESM compatibility issue causes false failures in isolated environments
      # 3. This workflow only runs after code has passed all CI checks

      - name: Check package version
        id: package_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Debug OIDC Environment
        shell: bash
        run: |
          echo "=== OIDC Environment Check ==="
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-NOT SET}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+SET (hidden)}"
          echo "GITHUB_ACTIONS: $GITHUB_ACTIONS"
          echo ""
          echo "=== npm version ==="
          npm --version
          echo ""
          echo "=== .npmrc files ==="
          cat ~/.npmrc 2>/dev/null || echo "No ~/.npmrc"
          cat .npmrc 2>/dev/null || echo "No ./.npmrc"
          echo ""
          echo "=== NPM_CONFIG_* vars ==="
          env | grep NPM_CONFIG || echo "No NPM_CONFIG vars"
          echo ""
          echo "=== NODE_AUTH_TOKEN ==="
          echo "NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN:-NOT SET}"

      - name: Publish to npm (with provenance)
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        env:
          # Ensure provenance is enabled for OIDC detection
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          # Publish with provenance via OIDC Trusted Publishing.
          # Requires: npm 11+ (Node 24), id-token: write, NODE_AUTH_TOKEN cleared,
          # and a Trusted Publisher configured at npmjs.com/package/@dollhousemcp/mcp-server/access
          VERSION="${{ steps.package_version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --tag rc --provenance --access public --loglevel verbose
          else
            npm publish --provenance --access public --loglevel verbose
          fi

      - name: Dry run (skip publish)
        if: github.event.inputs.dry_run == 'true'
        shell: bash
        run: |
          echo "🧪 DRY RUN MODE - Skipping publication"
          echo "Package would be published: @dollhousemcp/mcp-server@${{ steps.package_version.outputs.version }}"
          VERSION="${{ steps.package_version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --dry-run --tag rc
          else
            npm publish --dry-run
          fi

      - name: Notify success
        if: success() && github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          echo "✅ Successfully published @dollhousemcp/mcp-server@${{ steps.package_version.outputs.version }} to npm!"
          echo "📦 View at: https://www.npmjs.com/package/@dollhousemcp/mcp-server/v/${{ steps.package_version.outputs.version }}"
