name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Self-hosted security audit (fast iteration for mickdarling)
  # Runs when: mickdarling + not main branch + not scheduled
  self-hosted-security-audit:
    name: Security Audit (self-hosted)
    if: |
      github.actor == 'mickdarling' &&
      github.event_name != 'schedule' &&
      github.ref != 'refs/heads/main' &&
      github.base_ref != 'main'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    env:
      SELF_HOSTED_DOCKER: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Security Audit
        id: security-audit
        shell: bash
        run: |
          # Create security audit script
          cat > run-audit.js << 'EOF'
          import { SecurityAuditor } from './dist/security/audit/index.js';
          import { MarkdownReporter } from './dist/security/audit/reporters/MarkdownReporter.js';
          import { FileOperationsService } from './dist/services/FileOperationsService.js';
          import { FileLockManager } from './dist/security/fileLockManager.js';

          async function runAudit() {
            const fileLockManager = new FileLockManager();
            const fileOperations = new FileOperationsService(fileLockManager);
            const config = await SecurityAuditor.getDefaultConfig(fileOperations);
            config.reporting.formats = ['console', 'markdown', 'json'];
            config.reporting.createIssues = false;
            config.reporting.commentOnPr = false;
            const auditor = new SecurityAuditor(config, fileOperations);
            try {
              const result = await auditor.audit();
              const fs = await import('fs/promises');
              await fs.writeFile('security-audit-result.json', JSON.stringify(result, null, 2));
              const markdownReporter = new MarkdownReporter(result);
              const markdownReport = markdownReporter.generate();
              await fs.writeFile('security-audit-report.md', markdownReport);
              if (result.summary.bySeverity.critical > 0 || result.summary.bySeverity.high > 0) {
                process.exitCode = 1;
              }
            } catch (error) {
              console.error('Security audit failed:', error);
              process.exitCode = 1;
            }
          }
          runAudit();
          EOF

          if ! node run-audit.js; then
            echo "AUDIT_FAILED=true" >> $GITHUB_ENV
            echo "::warning::Security audit encountered errors but workflow will continue"
            echo '{"findings": [], "summary": {"total": 0, "critical": 0, "high": 0, "medium": 0, "low": 0}, "error": "Audit failed to complete"}' > security-audit-result.json
          fi

      - name: Self-hosted security audit complete
        shell: bash
        run: |
          echo "✅ Self-hosted security audit complete"
          echo "For full GitHub-hosted testing, push to main or use [full-matrix] flag"

  # GitHub-hosted security audit (for other contributors or main branch)
  security-audit:
    name: Security Audit
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
      security-events: write
    if: |
      github.actor != 'mickdarling' ||
      github.event_name == 'schedule' ||
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Security Audit
        id: security-audit
        shell: bash
        run: |
          # Create security audit script
          cat > run-audit.js << 'EOF'
          import { SecurityAuditor } from './dist/security/audit/index.js';
          import { MarkdownReporter } from './dist/security/audit/reporters/MarkdownReporter.js';
          import { FileOperationsService } from './dist/services/FileOperationsService.js';
          import { FileLockManager } from './dist/security/fileLockManager.js';

          async function runAudit() {
            // Create FileOperationsService for config loading
            const fileLockManager = new FileLockManager();
            const fileOperations = new FileOperationsService(fileLockManager);

            const config = await SecurityAuditor.getDefaultConfig(fileOperations);

            // Adjust config for CI
            config.reporting.formats = ['console', 'markdown', 'json'];
            config.reporting.createIssues = false; // Handle separately
            config.reporting.commentOnPr = false; // Handle separately

            const auditor = new SecurityAuditor(config, fileOperations);

            try {
              const result = await auditor.audit();

              // Save results for later steps
              const fs = await import('fs/promises');
              await fs.writeFile('security-audit-result.json', JSON.stringify(result, null, 2));

              // Generate markdown report
              const markdownReporter = new MarkdownReporter(result);
              const markdownReport = markdownReporter.generate();
              await fs.writeFile('security-audit-report.md', markdownReport);

              // Set exit code but don't exit immediately
              if (result.summary.bySeverity.critical > 0 || result.summary.bySeverity.high > 0) {
                process.exitCode = 1;
              }
            } catch (error) {
              console.error('Security audit failed:', error);
              process.exitCode = 1;
            }
          }

          runAudit();
          EOF
          
          # Run the audit with error handling
          if ! node run-audit.js; then
            echo "AUDIT_FAILED=true" >> $GITHUB_ENV
            echo "::warning::Security audit encountered errors but workflow will continue"
            # Create minimal report if audit fails
            echo '{"findings": [], "summary": {"total": 0, "critical": 0, "high": 0, "medium": 0, "low": 0}, "error": "Audit failed to complete"}' > security-audit-result.json
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: |
            security-audit-report.md
            security-audit-report.json
            security-audit-result.json

      - name: Generate SARIF report
        if: always()
        shell: bash
        run: |
          # Convert our JSON report to SARIF format
          cat > convert-to-sarif.js << 'EOF'
          import { readFile, writeFile } from 'fs/promises';
          
          async function convertToSarif() {
            const result = JSON.parse(await readFile('security-audit-result.json', 'utf-8'));
            
            const sarif = {
              version: '2.1.0',
              runs: [{
                tool: {
                  driver: {
                    name: 'DollhouseMCP Security Audit',
                    version: '1.0.0',
                    rules: []
                  }
                },
                results: result.findings.map(finding => ({
                  ruleId: finding.ruleId,
                  level: mapSeverityToLevel(finding.severity),
                  message: {
                    text: finding.message
                  },
                  locations: finding.file ? [{
                    physicalLocation: {
                      artifactLocation: {
                        uri: finding.file
                      },
                      region: {
                        startLine: finding.line || 1,
                        startColumn: finding.column || 1
                      }
                    }
                  }] : []
                }))
              }]
            };
            
            await writeFile('security-audit.sarif', JSON.stringify(sarif, null, 2));
          }
          
          function mapSeverityToLevel(severity) {
            switch (severity) {
              case 'critical':
              case 'high':
                return 'error';
              case 'medium':
                return 'warning';
              default:
                return 'note';
            }
          }
          
          convertToSarif().catch(console.error);
          EOF
          
          # Convert with validation
          if node convert-to-sarif.js; then
            echo "✅ SARIF report generated successfully"
          else
            echo "::warning::Failed to generate SARIF report"
            # Create minimal valid SARIF if conversion fails
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"DollhouseMCP Security Audit","version":"1.0.0"}},"results":[]}]}' > security-audit.sarif
          fi

      - name: Upload SARIF to GitHub
        if: always() && github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: security-audit.sarif
          category: security-audit
        # NOTE: SARIF upload requires GitHub Advanced Security
        # - FREE for public repositories
        # - Paid add-on for private repositories
        # This step auto-enables when merged to public production repo

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // GitHub comment limit is 65536 characters
            const MAX_COMMENT_LENGTH = 65000; // Leave some buffer

            // Read the markdown report
            let report = '## 🔒 Security Audit Results\n\n';

            try {
              if (fs.existsSync('security-audit-report.md')) {
                report += fs.readFileSync('security-audit-report.md', 'utf8');
              } else {
                report += '❌ Security audit report not generated.';
              }
            } catch (error) {
              report += `❌ Error reading report: ${error.message}`;
            }

            // Add status badge
            const failed = process.env.AUDIT_FAILED === 'true';
            if (failed) {
              report = '### ❌ Security Audit Failed\n\n' + report;
            } else {
              report = '### ✅ Security Audit Passed\n\n' + report;
            }

            // Truncate if too long
            if (report.length > MAX_COMMENT_LENGTH) {
              const truncationNote = '\n\n---\n⚠️ **Report truncated** - Full report available in workflow artifacts.';
              report = report.substring(0, MAX_COMMENT_LENGTH - truncationNote.length) + truncationNote;
            }

            // Comment on PR
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Create issues for critical findings
        if: github.event_name == 'schedule' && env.AUDIT_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              const result = JSON.parse(fs.readFileSync('security-audit-result.json', 'utf8'));
              const criticalFindings = result.findings.filter(f => f.severity === 'critical');
              
              for (const finding of criticalFindings.slice(0, 5)) { // Limit to 5 issues
                const title = `Security: ${finding.message}`;
                const body = `## Security Issue Detected

                **Rule**: ${finding.ruleId}
                **Severity**: ${finding.severity}
                **File**: ${finding.file || 'N/A'}
                **Line**: ${finding.line || 'N/A'}

                ### Description
                ${finding.message}

                ### Remediation
                ${finding.remediation}

                ### Code
                \`\`\`
                ${finding.code || 'N/A'}
                \`\`\`

                ---
                *This issue was automatically created by the Security Audit workflow.*`;
                
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: body,
                  labels: ['security', 'automated', 'priority: critical']
                });
              }
            } catch (error) {
              console.error('Failed to create issues:', error);
            }

      - name: Fail if critical issues found
        if: env.AUDIT_FAILED == 'true'
        shell: bash
        run: |
          echo "❌ Security audit found critical issues. Please review the report above."
          exit 1