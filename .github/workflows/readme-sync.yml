# README Sync Workflow
#
# Purpose:
#   Automatically rebuilds README files when documentation chunks are modified.
#   Creates a PR with the changes for review/merge to develop branch.
#
# Triggers:
#   - Push to develop branch when chunks/build files change
#   - Manual workflow dispatch for forced rebuilds
#
# How it works:
#   1. Detects changes to documentation chunks
#   2. Rebuilds all README files from chunks
#   3. Creates a PR to develop with the updated README files
#   4. Reuses existing PR if one is already open
#
# Why PR instead of direct push:
#   - Works with protected branches without bypass configuration
#   - Provides visibility into automated changes
#   - Allows review if needed (though typically auto-mergeable)
#
# Performance optimizations:
#   - Early exit if no relevant files changed
#   - Shallow clone (depth=2) for faster checkout
#   - Reuses existing PR to avoid PR spam

name: README Sync

on:
  push:
    branches:
      - develop  # Only sync on develop - main receives updates via GitFlow merges
    paths:
      - 'docs/readme/chunks/**'
      - 'scripts/build-readme.js'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Configuration constants for maintainability
env:
  NODE_VERSION: '20.x'
  BUILD_TIMEOUT: 10
  WORKFLOW_TIMEOUT: 15
  README_BUILD_COMMAND: 'npm run build:readme'
  README_FILES_PATTERN: 'README*.md'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.WORKFLOW_TIMEOUT || '15') }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2  # Need at least 2 commits to check changes
      
      # HIGH PRIORITY FIX: Check if this is an auto-commit to prevent infinite loops
      - name: Check if this is an auto-commit
        id: check_auto_commit
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" == *"Auto-sync README files"* ]] || [[ "$COMMIT_MSG" == *"chore: Auto-sync README"* ]]; then
            echo "Skipping auto-generated commit to prevent infinite loop"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      # MEDIUM PRIORITY FIX: Early exit if no relevant files changed
      - name: Check if relevant files changed
        if: steps.check_auto_commit.outputs.skip != 'true'
        id: check_triggers
        shell: bash
        run: |
          # Check if this is the initial run (workflow_dispatch) or if relevant files changed
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger - proceeding with build"
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            # Check if relevant files actually changed in the last commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || echo "")
            if echo "$CHANGED_FILES" | grep -E '^(docs/readme/chunks/|scripts/build-readme\.js|package\.json)'; then
              echo "Relevant files changed - proceeding with build"
              echo "proceed=true" >> $GITHUB_OUTPUT
            else
              echo "No relevant files changed - skipping"
              echo "proceed=false" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Setup Node.js
        if: steps.check_auto_commit.outputs.skip != 'true' && steps.check_triggers.outputs.proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        if: steps.check_auto_commit.outputs.skip != 'true' && steps.check_triggers.outputs.proceed == 'true'
        shell: bash
        run: npm ci
      
      # MEDIUM PRIORITY FIX: Add error handling for build step
      - name: Build README files
        if: steps.check_auto_commit.outputs.skip != 'true' && steps.check_triggers.outputs.proceed == 'true'
        id: build_readme
        timeout-minutes: ${{ fromJSON(env.BUILD_TIMEOUT) }}
        shell: bash
        run: |
          echo "📚 Building README files..."
          
          # Attempt to build README files with error handling
          if ! ${{ env.README_BUILD_COMMAND }}; then
            echo "❌ README build failed"
            echo "build_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Copy GitHub README to main README
          if [ -f "README.github.md" ]; then
            cp README.github.md README.md
            echo "✅ Copied README.github.md to README.md"
          else
            echo "⚠️ README.github.md not found"
            echo "build_failed=true" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ README files built successfully"
          
          # Show sizes for verification
          echo "📊 File sizes:"
          ls -lh README*.md 2>/dev/null || echo "No README files found"
      
      # MEDIUM PRIORITY FIX: Make file checking more flexible
      - name: Check for changes
        if: steps.check_auto_commit.outputs.skip != 'true' && steps.check_triggers.outputs.proceed == 'true' && steps.build_readme.outputs.build_failed != 'true'
        id: check_changes
        shell: bash
        run: |
          # Check for changes in any README files (more flexible than hardcoded list)
          # First verify README files exist
          README_COUNT=$(ls -1 ${{ env.README_FILES_PATTERN }} 2>/dev/null | wc -l)
          if [ "$README_COUNT" -eq 0 ]; then
            echo "❌ No README files found matching pattern: ${{ env.README_FILES_PATTERN }}"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "📄 Found $README_COUNT README file(s)"

          if git diff --quiet ${{ env.README_FILES_PATTERN }} 2>/dev/null; then
            echo "No changes to README files"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "README files have changed"
            echo "has_changes=true" >> $GITHUB_OUTPUT

            # Show what changed
            echo "📝 Changes detected in:"
            git diff --name-only ${{ env.README_FILES_PATTERN }} 2>/dev/null || echo "Error listing changed files"
          fi
      
      # Create a PR with the README changes instead of pushing directly to protected branch
      - name: Create README sync PR
        if: |
          steps.check_auto_commit.outputs.skip != 'true' &&
          steps.check_triggers.outputs.proceed == 'true' &&
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.build_readme.outputs.build_failed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create a unique branch name for this sync
          FULL_SHA="${{ github.sha }}"
          # Validate full SHA before truncation (should be 40 hex characters)
          if [[ ! "$FULL_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "❌ Invalid full SHA format: $FULL_SHA (expected 40 hex chars)"
            exit 1
          fi
          SHORT_SHA="${FULL_SHA:0:7}"
          SYNC_BRANCH="readme-sync/auto-${SHORT_SHA}"

          # Check if there's already an open README sync PR
          EXISTING_PR=$(gh pr list --base develop --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("readme-sync/")) | .number' | head -1 || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "📝 Updating existing PR #$EXISTING_PR..."

            # Get the existing branch name
            EXISTING_BRANCH=$(gh pr view "$EXISTING_PR" --json headRefName --jq '.headRefName')

            # Fetch and checkout existing branch
            FETCH_FAILED=false
            if ! git fetch origin "$EXISTING_BRANCH" 2>&1; then
              echo "⚠️ Could not fetch existing branch '$EXISTING_BRANCH'"
              echo "   Reason: Branch may have been deleted or force-pushed"
              echo "   Action: Will create fresh branch from current HEAD"
              FETCH_FAILED=true
            fi

            if [ "$FETCH_FAILED" = "true" ]; then
              echo "📌 Creating fresh branch: $EXISTING_BRANCH"
              git checkout -b "$EXISTING_BRANCH"
            else
              echo "📌 Checking out existing branch: $EXISTING_BRANCH"
              git checkout -B "$EXISTING_BRANCH" "origin/$EXISTING_BRANCH" 2>/dev/null || git checkout -b "$EXISTING_BRANCH"
            fi

            # Add and commit changes
            git add ${{ env.README_FILES_PATTERN }}
            if git commit -m "chore: Update README files" -m "Triggered by: ${{ github.sha }}"; then
              echo "✅ Changes committed successfully"
            else
              echo "ℹ️ No new changes to commit"
              exit 0  # Explicit clean exit - nothing to push
            fi

            # Push updates
            git push origin "$EXISTING_BRANCH"

            # Add comment to PR
            gh pr comment "$EXISTING_PR" --body "📚 README files updated from commit ${{ github.sha }}"

            echo "✅ Updated existing PR #$EXISTING_PR"
          else
            echo "📤 Creating new README sync PR..."

            # Create and checkout new branch
            git checkout -b "$SYNC_BRANCH"

            # Add and commit changes
            git add ${{ env.README_FILES_PATTERN }}
            git commit -m "chore: Auto-sync README files" -m "Automatically generated from docs/readme/chunks/" -m "Triggered by: ${{ github.sha }}"

            # Push the branch
            git push origin "$SYNC_BRANCH"

            # Create PR (body passed via environment variable to avoid YAML parsing issues)
            PR_BODY="Automated README Synchronization - This PR automatically syncs README files rebuilt from documentation chunks. Files updated: README.md, README.npm.md, README.github.md. Created by README Sync workflow."
            gh pr create --base develop --head "$SYNC_BRANCH" --title "chore: Auto-sync README files" --body "$PR_BODY"

            echo "✅ Created new README sync PR"
          fi
      
      # Summary output for visibility
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## README Sync Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_auto_commit.outputs.skip }}" == "true" ]; then
            echo "⏭️ **Skipped**: Auto-commit detected (preventing infinite loop)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.check_triggers.outputs.proceed }}" != "true" ]; then
            echo "⏭️ **Skipped**: No relevant files changed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.build_readme.outputs.build_failed }}" == "true" ]; then
            echo "❌ **Failed**: README build failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.check_changes.outputs.has_changes }}" != "true" ]; then
            echo "✅ **Success**: No changes needed (files already up to date)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Success**: README sync PR created/updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Details" >> $GITHUB_STEP_SUMMARY
            echo "- Triggered by commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "- Event: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
            echo "- A PR has been created or updated with the README changes" >> $GITHUB_STEP_SUMMARY
          fi

      # Cleanup stale readme-sync branches that no longer have open PRs
      - name: Cleanup stale sync branches
        if: always()
        continue-on-error: true  # Don't fail the workflow if cleanup fails
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "🧹 Checking for stale readme-sync branches..."

          # Get all remote readme-sync branches
          SYNC_BRANCHES=$(git branch -r | grep 'origin/readme-sync/auto-' | sed 's|origin/||' || echo "")

          if [ -z "$SYNC_BRANCHES" ]; then
            echo "No readme-sync branches found"
            exit 0
          fi

          DELETED_COUNT=0
          KEPT_COUNT=0

          for BRANCH in $SYNC_BRANCHES; do
            # Check if there's an open PR for this branch
            OPEN_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ -z "$OPEN_PR" ]; then
              echo "🗑️ Deleting stale branch: $BRANCH (no open PR)"
              if git push origin --delete "${BRANCH#origin/}" 2>/dev/null; then
                DELETED_COUNT=$((DELETED_COUNT + 1))
              else
                echo "   ⚠️ Could not delete $BRANCH"
              fi
            else
              echo "✅ Keeping branch: $BRANCH (PR #$OPEN_PR is open)"
              KEPT_COUNT=$((KEPT_COUNT + 1))
            fi
          done

          echo ""
          echo "📊 Cleanup summary: Deleted $DELETED_COUNT branch(es), kept $KEPT_COUNT branch(es)"

          # Add to step summary
          if [ $DELETED_COUNT -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Branch Cleanup" >> $GITHUB_STEP_SUMMARY
            echo "- Deleted $DELETED_COUNT stale readme-sync branch(es)" >> $GITHUB_STEP_SUMMARY
            echo "- Kept $KEPT_COUNT branch(es) with open PRs" >> $GITHUB_STEP_SUMMARY
          fi