name: "CodeQL config"

# Paths to ignore during analysis
paths-ignore:
  - test/__tests__/security/regexValidator.test.ts
  - 'test/**/*.test.ts'

# Query filters to exclude specific alerts
# FIX: Use correct array syntax for id field (CodeQL documentation)
query-filters:
  - exclude:
      id:
        - js/polynomial-redos
        - js/redos
      paths:
        - "test/**"

  - exclude:
      id:
        - js/prototype-polluting-assignment
        - js/prototype-pollution-utility
      paths:
        - "src/config/ConfigManager.ts"

  - exclude:
      id: js/missing-rate-limiting

  - exclude:
      id: js/path-injection
      paths:
        - "src/web/routes.ts"

  - exclude:
      id: js/request-forgery
      paths:
        - "src/web/routes.ts"

# Additional documentation
# These test files intentionally contain vulnerable regex patterns
# to test our security validation mechanisms
# ConfigManager.ts prototype pollution alerts are false positives:
# The code validates all keys with validatePropertyPath() before any assignments
# js/missing-rate-limiting: All Express routes use router.use() middleware with
# contentRateLimiter.tryAcquire() but CodeQL cannot trace through middleware
# js/path-injection in routes.ts: Element detail route validates type against
# ELEMENT_TYPES whitelist, checks name for '..' and '\', matches filenames against
# readdir() results (no user-controlled segments reach filesystem), and verifies
# resolve() stays within portfolioDir
# js/request-forgery in routes.ts: Collection proxy has hardcoded domain
# (raw.githubusercontent.com) and repo (DollhouseMCP/collection), validates
# element type against ELEMENT_TYPES whitelist, and checks for path traversal.
# Only reachable target is one specific public GitHub repository