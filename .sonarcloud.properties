# SonarCloud Configuration
# This file is used by SonarCloud's Automatic Analysis

# Exclude files from duplication detection
# suppressions.ts has 678 lines of intentionally repetitive configuration
sonar.cpd.exclusions=src/security/audit/config/suppressions.ts,src/security/audit/config/**,**/tests/**,**/test/**,tests/**,test/**

# Exclude E2E test scaffolding (harness + setup) from analysis. These files —
# the config loader, global setup, and child-process provisioning — carry
# test-only findings (fixed test credentials, trailing-slash regexes,
# child-process PATH) that are inherent to test infrastructure, not shippable
# code. Excluding the files removes their issues AND security hotspots.
# NOTE: Automatic Analysis reads THIS file, not sonar-project.properties
# (which it ignores), so analysis-scope exclusions must live here.
sonar.exclusions=tests/integration/web-console-e2e/harness/**,tests/integration/web-console-e2e/setup/**
sonar.test.exclusions=tests/integration/web-console-e2e/harness/**,tests/integration/web-console-e2e/setup/**